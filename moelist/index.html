<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="shortcut icon" href="icon.svg" type="image/x-icon" />

        <meta property="og:title" content="MoeList" />
        <meta
            property="og:description"
            content="Multiplatform MyAnimeList client"
        />
        <meta name="description" content="Multiplatform MyAnimeList client" />
        <meta name="author" content="axiel7" />
        <meta name="keywords" content="myanimelist client, moelist" />

        <title>MoeList</title>

        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="trailing">
            <a
                href="https://github.com/axiel7/MoeListKMP"
                style="padding-right: 15px"
                target="_blank"
                rel="noopener noreferrer"
            >
                GitHub
            </a>
            <a
                href="https://discord.gg/CTv3WdfxHh"
                style="padding-right: 15px"
                target="_blank"
                rel="noopener noreferrer"
            >
                Discord
            </a>
            <a href="https://axiel7.github.io/donations">Donations</a>
        </div>
        <div class="centered">
            <img class="image-circle" width="50%" src="icon.svg" />
            <h1>MoeList</h1>
            <p>Another unofficial MyAnimeList client. Now multiplatform!</p>

            <h2>Mobile</h2>
            <div class="badge-container">
                <a
                    href="https://play.google.com/store/apps/details?id=com.axiel7.moelist"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        alt="Google Play"
                        height="80"
                        src="https://play.google.com/intl/en_US/badges/images/generic/en_badge_web_generic.png"
                    />
                </a>
                <a
                    href="https://apt.izzysoft.de/fdroid/index/apk/com.axiel7.moelist"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        alt="Get it on F-Droid"
                        height="80"
                        src="https://fdroid.gitlab.io/artwork/badge/get-it-on.png"
                    />
                </a>
                <a
                    href="https://apps.apple.com/us/app/moelist/id6760654536"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        alt="App Store"
                        height="55"
                        src="https://github.com/axiel7/AniHyou-iOS/blob/main/AppStore-badge.png?raw=true"
                    />
                </a>
            </div>

            <h2>Desktop downloads</h2>
            <div class="badge-container" style="gap: 20px">
                <a
                    href="https://github.com/axiel7/MoeListKMP/releases/latest/download/moelist.exe"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Windows
                </a>
                <a
                    href="https://github.com/axiel7/MoeListKMP/releases/latest/download/MoeList-x86_64.AppImage"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Linux
                </a>
                <a
                    href="https://apps.apple.com/us/app/moelist/id6760654536"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    macOS
                </a>
            </div>
        </div>
    </body>
</html>
